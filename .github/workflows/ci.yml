name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Set up job
        run: echo "Starting CI job for Finance Buddy"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Repository structure:"
          ls -la
          echo "Source directory:"
          ls -la src/
          echo "Server directory:"
          ls -la server/

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Backend Dependencies
        run: |
          echo "Installing backend dependencies..."
          npm ci --legacy-peer-deps

      - name: Run Backend Tests
        run: |
          echo "Running backend tests..."
          # Test backend module loading
          node -e "import('./server/db.js').then(()=>console.log('✅ Backend db module loads successfully')).catch((e)=>{console.error('❌ Backend db failed:', e); process.exit(1);})"

      - name: Install Frontend Dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build React App
        run: |
          echo "Building React application..."
          npm run build

      - name: Post Setup Node
        run: |
          echo "Node setup cleanup completed"
          node --version
          npm --version

      - name: Post Checkout Code
        run: |
          echo "Code checkout cleanup completed"
          echo "Current directory: $(pwd)"
          echo "Git status:"
          git status --short

      - name: Complete job
        run: |
          echo "🎉 CI job completed successfully!"
          echo "✅ All tests passed"
          echo "✅ Build completed"
          echo "✅ Repository structure verified"
